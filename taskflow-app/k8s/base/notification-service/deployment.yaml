apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: TON_DOCKERHUB/taskflow-notification-service:v1.0.0
          imagePullPolicy: Always

          ports:
            - containerPort: 3003

          env:
            - name: PORT
              value: "3003"

          envFrom:
            - configMapRef:
                name: taskflow-app-config

          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 20
            periodSeconds: 10