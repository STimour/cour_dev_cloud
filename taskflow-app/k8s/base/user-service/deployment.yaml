apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: TON_DOCKERHUB/taskflow-user-service:v1.0.0
          imagePullPolicy: Always

          ports:
            - containerPort: 3001

          env:
            - name: PORT
              value: "3001"

          envFrom:
            - configMapRef:
                name: taskflow-app-config
            - secretRef:
                name: taskflow-app-secret

          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10