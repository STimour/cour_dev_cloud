apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.taskService.replicaCount }}
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      containers:
        - name: task-service
          image: "{{ .Values.image.repository }}/taskflow-task-service:{{ .Values.taskService.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PORT
              value: "3002"
            - name: OTEL_SERVICE_NAME
              value: task-service
          envFrom:
            - configMapRef:
                name: taskflow-app-config
            - secretRef:
                name: taskflow-app-secret
          ports:
            - containerPort: 3002
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.taskService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: task-service
  ports:
    - name: http
      port: 3002
      targetPort: 3002
