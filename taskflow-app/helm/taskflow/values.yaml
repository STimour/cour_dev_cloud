image:
  repository: dorianyloj
  pullPolicy: IfNotPresent

environment: staging

postgres:
  user: taskflow
  password: ""
  db: taskflow
  storageSize: 1Gi

jwt:
  secret: ""

otel:
  endpoint: http://otel-collector:4318
  exportIntervalMs: "5000"

services:
  userServiceUrl: http://user-service:3001
  taskServiceUrl: http://task-service:3002
  notificationServiceUrl: http://notification-service:3003

logging:
  level: info

userService:
  replicaCount: 2
  tag: v1.0.0
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

frontend:
  replicaCount: 2
  tag: v1.0.0
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"

taskService:
  replicaCount: 2
  tag: v1.0.0
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

notificationService:
  replicaCount: 1
  tag: v1.0.0
  resources:
    requests:
      memory: "96Mi"
      cpu: "50m"
    limits:
      memory: "192Mi"
      cpu: "300m"

apiGateway:
  replicaCount: 2
  tag: v1.0.0
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

ingress:
  enabled: true
  className: nginx

redis:
  enabled: true
  fullnameOverride: redis
  architecture: standalone
  auth:
    enabled: false
  image:
    registry: docker.io
    tag: latest
  master:
    resources:
      requests:
        memory: "32Mi"
        cpu: "50m"
      limits:
        memory: "64Mi"
        cpu: "100m"
