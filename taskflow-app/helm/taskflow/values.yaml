image:
  prefix: bruce1000/taskflow
  pullPolicy: IfNotPresent

postgres:
  user: {{ .Values.postgres.user }}
  password: {{ .Values.postgres.password }}
  db: {{ .Values.postgres.db }}
  url: {{ .Values.postgres.url }}
  storageSize: 1Gi

otel:
  endpoint: {{ .Values.otel.endpoint }}

userService:
  replicaCount: 2
  tag: v1.0.1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

frontend:   
  replicaCount: 2
  tag: v1.0.1

taskService:
  replicaCount: 2
  tag: v1.0.1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

notificationService:
  replicaCount: 1
  tag: v1.0.1

apiGateway:
  replicaCount: 2
  tag: v1.0.1
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

redis:
  enabled: true
  fullnameOverride: redis
  architecture: standalone
  auth:
    enabled: false
  image:
    registry: docker.io
    tag: latest
  master:
    resources:
      requests:
        memory: "32Mi"
        cpu: "50m"
      limits:
        memory: "64Mi"
        cpu: "100m"